{% extends "layout.html" %}

{% block main %}
  <form action="/append" method="post">
    {% for shoe in shoes %}
      <h4 id="{{ shoe.id }}">{{ shoe.name }}</h4>
      <img src="{{ shoe.image }}"></img>
      <p>{{ shoe.description }}</p>
      <ul>
        <li>{{ shoe.colorway }}</li>
        <li>{{ shoe.releaseDate }}</li>
        <li>{{ shoe.retailPrice | usd }}</li>
        <li>{{ shoe.styleID }}</li>
      </ul>
      <a href="{{ shoe.purchase }}">Buy from StockX</a>
      <br \>
      <br \>
      <br \>
      <h6>Add to:</h6>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="inlineCheckbox1" name="top" value="true">
        <label class="form-check-label" for="inlineCheckbox1">Favorites</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="inlineCheckbox2"  name="wish" value="true">
        <label class="form-check-label" for="inlineCheckbox2">Wishlist</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="inlineCheckbox3" name="purchased" value="true">
        <label class="form-check-label" for="inlineCheckbox3">Purchased</label>
      </div>
      <button name="shoe" value="{{ shoe.id }}" type="submit" class="btn btn-primary">Submit</button>
    {% endfor %}
  </form>
{% endblock %}
